<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>המדריך המקצועי: חיפוי ופנלים</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#134e4a">
    <link rel="icon" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/1048/1048953.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Heebo', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 10px; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: auto; height: 300px; }
        .diagram-element { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* התאמה למבנה אפליקציה - מניעת גלילה מיותרת בראש הדף */
        header { padding-top: env(safe-area-inset-top); }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 800: '#115e59', 900: '#134e4a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-50 text-stone-800 antialiased selection:bg-brand-500 selection:text-white">

    <div class="max-w-6xl mx-auto px-4 py-6">
        
        <header class="mb-8 text-center">
            <div class="inline-flex items-center justify-center p-3 bg-brand-100 rounded-full mb-4 text-brand-600">
                <span class="text-3xl">🏗️</span>
            </div>
            <h1 class="text-3xl font-bold text-stone-900 mb-2 tracking-tight">מדריך מפגש קיר-רצפה</h1>
            <p class="text-base text-stone-600 max-w-lg mx-auto">מערכת תומכת החלטה להתקנת חיפויים ופנלים</p>
        </header>

        <section class="bg-white rounded-2xl shadow-sm border border-stone-200 p-5 mb-8">
            <h2 class="text-xl font-bold text-stone-900 mb-4 flex items-center gap-2">
                <span class="text-brand-500">📚</span> מושגי יסוד
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="p-3 bg-stone-50 rounded-xl border border-stone-100">
                    <h3 class="font-bold text-brand-800 text-sm">חיפוי פולימרי</h3>
                    <p class="text-xs text-stone-600">לוחות קשיחים עמידים למים, רגישים למכות ישירות בתחתית.</p>
                </div>
                <div class="p-3 bg-stone-50 rounded-xl border border-stone-100">
                    <h3 class="font-bold text-brand-800 text-sm">ניתוק אדריכלי</h3>
                    <p class="text-xs text-stone-600">מרווח של 2-3 מ"מ למניעת מגע עם מים ושינויי טמפרטורה.</p>
                </div>
            </div>
        </section>

        <section class="mb-8">
            <h2 class="text-xl font-bold text-stone-900 mb-4">סימולטור התקנה</h2>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <div class="lg:col-span-5 flex flex-col gap-3">
                    <button onclick="updateVisualizer('opt1')" id="btn-opt1" class="text-right px-4 py-3 rounded-xl border-2 border-transparent bg-white shadow-sm transition-all">
                        <div class="font-bold text-stone-800">1. חיפוי עד הרצפה</div>
                        <div class="text-xs text-stone-500">ללא פנל באזור המחופה</div>
                    </button>
                    <button onclick="updateVisualizer('opt2')" id="btn-opt2" class="text-right px-4 py-3 rounded-xl border-2 border-brand-500 bg-brand-50 shadow-sm transition-all relative">
                        <div class="font-bold text-brand-900">2. חיפוי מעל פנל היקפי</div>
                        <div class="text-xs text-brand-700">הפנל כבסיס (מומלץ)</div>
                    </button>
                    <button onclick="updateVisualizer('opt3')" id="btn-opt3" class="text-right px-4 py-3 rounded-xl border-2 border-transparent bg-white shadow-sm transition-all">
                        <div class="font-bold text-stone-800">3. פנל על החיפוי</div>
                        <div class="text-xs text-stone-500">התקנה מדורגת</div>
                    </button>

                    <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm mt-2">
                        <h3 id="detail-title" class="font-bold text-stone-900 mb-2">אופציה 2</h3>
                        <p id="detail-desc" class="text-sm text-stone-600 mb-4"></p>
                        <div class="grid grid-cols-1 gap-3">
                            <div>
                                <h4 class="font-bold text-emerald-700 text-xs uppercase">✓ יתרונות</h4>
                                <ul id="detail-pros" class="text-xs text-stone-600 list-disc list-inside"></ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-7 bg-white rounded-2xl border border-stone-200 shadow-sm p-4 flex flex-col items-center justify-center min-h-[300px]">
                    <div class="relative w-full max-w-sm h-64 bg-stone-50 border-2 border-dashed border-stone-200 rounded-lg overflow-hidden flex items-end justify-center">
                        <div class="absolute right-8 top-0 h-full w-20 bg-stone-300 border-l border-stone-400"></div>
                        <div class="absolute bottom-0 w-full h-10 bg-[#e6ccb2] border-t-4 border-[#ddb892] z-20"></div>
                        
                        <div id="vis-cladding" class="diagram-element absolute bg-[#bde0fe] border-l-2 border-[#a2d2ff] z-30" style="right: 7rem; top: 0; bottom: 4.5rem; width: 0.8rem;"></div>
                        <div id="vis-baseboard" class="diagram-element absolute bg-white border-2 border-stone-300 rounded-t-sm z-40 shadow-sm" style="right: 7rem; bottom: 2.5rem; height: 3.5rem; width: 1.2rem;"></div>
                        <div id="vis-gap" class="diagram-element absolute border-2 border-rose-400 rounded-full z-50 opacity-0" style="right: 7rem; bottom: 2.5rem; height: 1rem; width: 1rem; transform: translate(50%, 50%);"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-stone-200 p-5 mb-8">
            <h2 class="text-xl font-bold text-stone-900 mb-4 text-center">ניתוח ביצועים הנדסי</h2>
            <div class="chart-container">
                <canvas id="comparisonChart"></canvas>
            </div>
        </section>

        <section class="bg-brand-900 rounded-2xl p-6 text-white mb-8">
            <h2 class="text-2xl font-bold mb-4">מחשבון עוביים</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-brand-100 text-sm mb-1">עובי
