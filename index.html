<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מדריך אדריכלי: חיפוי קיר</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <link rel="icon" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/1048/1048953.png">

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 { color: #2c3e50; text-align: center; }
        .step { border-right: 4px solid #3498db; padding-right: 15px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>מדריך מקצועי: חיפוי קיר</h1>
        <div class="step">
            <h3>שלב 1: הכנת התשתית</h3>
            <p>וודא שהקיר ישר ונקי מאבק לפני תחילת העבודה.</p>
        </div>
        <div class="step">
            <h3>שלב 2: מריחת דבק</h3>
            <p>יש להשתמש בדבק גמיש המתאים לסוג החיפוי שנבחר.</p>
        </div>
    </div>
</body>
</html>
